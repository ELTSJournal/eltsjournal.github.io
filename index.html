<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Journal of ELTS - Directory</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1DFe5cEnERQ2qhUl8zHS27wG_fzZS1Mxg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #04060d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ABSTRACT ANIMATED BACKDROP LAYER (ENHANCED & LIVELY) --- */
        .bg-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .abstract-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px); 
            opacity: 0.45;       
            mix-blend-mode: screen;
        }

        /* Primary Blue Orb - Dynamic Fluid Floating */
        .orb-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #2563eb 0%, #1d4ed8 100%);
            top: -10%;
            left: -10%;
            animation: floatOrb1 14s infinite ease-in-out; 
        }

        /* Deep Navy support - Sweeping Counter-Movement */
        .orb-2 {
            width: 550px;
            height: 550px;
            background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%);
            bottom: -10%;
            left: -5%;
            animation: floatOrb2 18s infinite ease-in-out;
        }

        /* Journal Gold Orb - Bolder Pulsing & Shifting */
        .orb-3 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #F7BC4A 0%, #b47b1c 100%);
            bottom: -10%;
            right: -5%;
            opacity: 0.35; 
            animation: floatOrb3 10s infinite ease-in-out;
        }

        /* --- NEW MULTI-AXIS LIVE KEYFRAMES --- */
        @keyframes floatOrb1 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(120px, 60px) scale(1.15) rotate(120deg); }
            66% { transform: translate(-40px, 130px) scale(0.9) rotate(240deg); }
            100% { transform: translate(0, 0) scale(1) rotate(360deg); }
        }

        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            50% { transform: translate(-100px, -120px) scale(1.25) rotate(-180deg); }
            100% { transform: translate(0, 0) scale(1) rotate(-360deg); }
        }

        @keyframes floatOrb3 {
            0% { transform: translate(0, 0) scale(0.85); opacity: 0.25; }
            50% { transform: translate(-140px, -80px) scale(1.3); opacity: 0.45; }
            100% { transform: translate(0, 0) scale(0.85); opacity: 0.25; }
        }
        
        /* --- CORE WRAPPER CARD --- */
        .directory-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: rgba(10, 14, 26, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 42px 30px;
            
            /* FIXED: Force Flex Index Centering to prevent left-alignment */
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center;
            
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.08);
        }

        /* --- PROFILE IDENTIFIER ELEMENTS --- */
        .journal-logo {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 22px;
            border: 2px solid rgba(247, 188, 74, 0.6);
            box-shadow: 0 8px 24px rgba(247, 188, 74, 0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 400;
            margin-bottom: 38px;
            letter-spacing: 0.2px;
        }

        /* --- HIGH-CONTRAST ACTION BUTTONS --- */
        .gateway-link {
            width: 100%; /* FIXED: Ensures buttons stretch to fill the centered card */
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            color: #f0f7ff;
            text-decoration: none;
            padding: 18px 24px;
            margin-bottom: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .gateway-link.primary-hub {
            background: linear-gradient(135deg, rgba(247, 188, 74, 0.12) 0%, rgba(37, 99, 235, 0.03) 100%);
            border: 1px solid rgba(247, 188, 74, 0.35);
            color: #f7bc4a;
        }

        .gateway-link:hover {
            background: #f0f7ff;
            color: #04060d;
            border-color: #f0f7ff;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4), 
                        0 0 16px rgba(255, 255, 255, 0.05);
        }

        .gateway-link.primary-hub:hover {
            background: linear-gradient(135deg, #F7BC4A 0%, #e0a434 100%);
            color: #04060d;
            border-color: #F7BC4A;
            box-shadow: 0 12px 28px rgba(247, 188, 74, 0.35);
        }

        .btn-label {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-icon-prefix {
            font-size: 18px;
            display: flex; /* Helps align SVGs smoothly with text */
        }

        .arrow-indicator {
            font-size: 12px;
            opacity: 0.6;
            transition: transform 0.2s ease;
        }

        .primary-hub .arrow-indicator {
            color: #f7bc4a;
        }

        .gateway-link:hover .arrow-indicator {
            transform: translateX(4px);
            opacity: 1;
            color: inherit;
        }

        /* --- FOOTER REGISTRY LABELS --- */
        .footer-branding {
            margin-top: 38px;
            font-size: 11px;
            color: #57657a;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>

</body>
</html>
