        html {

            overflow-x: hidden;
            position: relative;
        }

        /* ── ANIMATED BACKDROP ──────────────────────── */
        .bg-background {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden; 
        }

            mix-blend-mode: screen;
            will-change: transform; /* Optimizes fluid performance */
        }
