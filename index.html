    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {

    .routing-animation {

      height: 60px;
      margin-bottom: 35px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .node {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #112240;
      border: 2px solid var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      z-index: 2;
    }

    .node-source {
      border-color: var(--elts-blue);
      color: var(--elts-blue);
      box-shadow: 0 0 15px var(--border-glow);
    }

    .node-target {
      border-color: #34d399;
      color: #34d399;
      animation: pulseTarget 1.5s infinite alternate;
    }

    .data-stream-line {
      position: absolute;
      left: 65px;
      right: 65px;
      height: 2px;
      background: rgba(255,255,255,0.1);
      z-index: 1;
    }

    .data-pulse {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--elts-blue);
      box-shadow: 0 0 12px var(--elts-blue);
      left: 65px;
      animation: streamPass 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* FOOTER TICKER */
    .ticker {
      font-family: monospace;
      font-size: 0.8rem;
      color: #34d399;
      letter-spacing: 0.5px;
      min-height: 20px;
    }

    .manual-link {
      display: inline-block;
      margin-top: 25px;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .manual-link a { color: var(--elts-blue); text-decoration: none; }
    .manual-link a:hover { text-decoration: underline; }

    /* ANIMATIONS */
    @keyframes pulseLogo {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.9; }
    }
    @keyframes pulseTarget {
      0% { box-shadow: 0 0 0px rgba(52, 211, 153, 0); }
      100% { box-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }
    }
    @keyframes streamPass {
      0% { left: 55px; background: var(--elts-blue); box-shadow: 0 0 12px var(--elts-blue); }
      100% { left: calc(100% - 65px); background: #34d399; box-shadow: 0 0 12px #34d399; }
    }
  </style>
</head>
