<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Journal of ELTS - Directory</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1DFe5cEnERQ2qhUl8zHS27wG_fzZS1Mxg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #04060d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ABSTRACT ANIMATED BACKDROP LAYER --- */
        .bg-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .abstract-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.3;
            mix-blend-mode: screen;
        }

        /* Primary Blue Orb */
        .orb-1 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #2563eb 0%, #1d4ed8 100%);
            top: -10%;
            left: -5%;
            animation: driftAround 25s infinite alternate ease-in-out;
        }

        /* Deep Navy base support */
        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #1e3a8a 0%, #0f172a 100%);
            bottom: -10%;
            left: -10%;
            animation: driftAround 30s infinite alternate-reverse ease-in-out;
        }

        /* NEW: Journal Secondary Gold (#F7BC4A) Orb */
        .orb-3 {
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, #F7BC4A 0%, #b47b1c 100%);
            bottom: -15%;
            right: -5%;
            opacity: 0.25;
            animation: pulseSize 18s infinite alternate ease-in-out;
        }

        @keyframes driftAround {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1) rotate(30deg); }
            100% { transform: translate(-30px, 60px) scale(0.95) rotate(-30deg); }
        }

        @keyframes pulseSize {
            0% { transform: scale(0.85); opacity: 0.2; }
            100% { transform: scale(1.15); opacity: 0.35; }
        }

        /* --- CORE WRAPPER CARD (GLASSMORPHISM) --- */
        .directory-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: rgba(10, 14, 26, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 28px;
            padding: 42px 30px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.08);
        }

        /* --- PROFILE IDENTIFIER ELEMENTS --- */
        .journal-logo {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 22px;
            /* Border updated to reflect gold profile accent */
            border: 2px solid rgba(247, 188, 74, 0.6);
            box-shadow: 0 8px 24px rgba(247, 188, 74, 0.2);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            font-weight: 400;
            margin-bottom: 38px;
            letter-spacing: 0.2px;
        }

        /* --- HIGH-CONTRAST ACTION BUTTONS --- */
        .gateway-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            color: #f0f7ff;
            text-decoration: none;
            padding: 18px 24px;
            margin-bottom: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Highlighting the Primary Hub with custom gold theme elements */
        .gateway-link.primary-hub {
            background: linear-gradient(135deg, rgba(247, 188, 74, 0.12) 0%, rgba(37, 99, 235, 0.03) 100%);
            border: 1px solid rgba(247, 188, 74, 0.35);
            color: #f7bc4a;
        }

        .gateway-link:hover {
            background: #f0f7ff;
            color: #04060d;
            border-color: #f0f7ff;
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4), 
                        0 0 16px rgba(255, 255, 255, 0.05);
        }

        /* Premium hover transformation using the gold accent color */
        .gateway-link.primary-hub:hover {
            background: linear-gradient(135deg, #F7BC4A 0%, #e0a434 100%);
            color: #04060d;
            border-color: #F7BC4A;
            box-shadow: 0 12px 28px rgba(247, 188, 74, 0.35);
        }

        .btn-label {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .btn-icon-prefix {
            font-size: 18px;
        }

        .arrow-indicator {
            font-size: 12px;
            opacity: 0.6;
            transition: transform 0.2s ease;
        }

        /* Subtle gold colored arrow inside the primary button */
        .primary-hub .arrow-indicator {
            color: #f7bc4a;
        }

        .gateway-link:hover .arrow-indicator {
            transform: translateX(4px);
            opacity: 1;
            color: inherit;
        }

        /* --- FOOTER REGISTRY LABELS --- */
        .footer-branding {
            margin-top: 38px;
            font-size: 11px;
            color: #57657a;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- Ambient Animated Backdrop Elements -->
    <div class="bg-background">
        <div class="abstract-orb orb-1"></div>
        <div class="abstract-orb orb-2"></div>
        <div class="abstract-orb orb-3"></div> <!-- Infused with gold parameters -->
    </div>

    <!-- UI Presentational Layer -->
    <div class="directory-card">
        <img src="https://lh3.googleusercontent.com/d/1DFe5cEnERQ2qhUl8zHS27wG_fzZS1Mxg" alt="ELTS Logo" class="journal-logo">
        <h1>e-Journal of ELTS</h1>
        <div class="subtitle">English Language Teaching Society Portal</div>

        <!-- Directory Buttons Grid -->
        <a href="https://eltsjournal.github.io/home" class="gateway-link primary-hub" target="_blank">
            <span class="btn-label">
                <span class="btn-icon-prefix">🌐</span>
                <span>Official OJS Journal Homepage</span>
            </span>
            <span class="arrow-indicator">➔</span>
        </a>

        <a href="https://wa.me/6282292824431" class="gateway-link" target="_blank">
            <span class="btn-label">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#25D366" style="display: inline-block; vertical-align: middle;">

                </svg>
                <span>Reach us on WhatsApp</span>
            </span>
            <span class="arrow-indicator">➔</span>
        </a>
        
        <a href="mailto:eltsjournal.pbi@untad.ac.id" class="gateway-link">
            <span class="btn-label">
                <span class="btn-icon-prefix">📧</span>
                <span>Questions? Send Us e-Mails</span>
            </span>
            <span class="arrow-indicator">➔</span>
        </a>

        <div class="footer-branding">e-Journal of ELTS © 2026</div>
    </div>

</body>
</html>
